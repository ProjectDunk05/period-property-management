<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Period Property Management</title>
    <link rel="stylesheet" href="css/modern-normalise.css">
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="js/portalDashboard.js" defer></script>
</head>
<body>
    <picture class="background">
        <!-- AVIF source -->
        <source type="image/avif" srcset="
        images/background-stars-800.avif 800w,
        images/background-stars-1200.avif 1200w,
        images/background-stars-1600.avif 1600w" sizes="100vw">

        <!-- WebP source -->
        <source type="image/webp" srcset="
        images/background-stars-800.webp 800w,  
        images/background-stars-1200.webp 1200w,
        images/background-stars-1600.webp 1600w" sizes="100vw">

        <!-- JPEG fallback -->
        <img src="images/background-stars-1200.jpg" srcset="    
        images/background-stars-800.jpg 800w,
        images/background-stars-1200.jpg 1200w,
        images/background-stars-1600.jpg 1600w" sizes="100vw" alt="Background stars" class="background-img"  decoding="async"
            fetchpriority="high">
    </picture>
    <a href="index.html" class="portalButton return" id="returnToSiteButton">Return To Site</a>
    <div class="container content">
        <div class="box">
            <div class="card">
                <h1 id="welcomeMessage"></h1>
                <p id="dashboardLoadingMessage">Loading dashboard content and checking profile...</p>

                <div id="dashboardContent" class="hidden">
                    <p class="subtitle">Your Documents:</p>
                    <div id="files-list">
                        <p id="noFilesMessage" class="hidden">No files found for you yet.</p>
                        <ul id="userFiles">
                            <!-- Files will be loaded here dynamically -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>   
</body>
</html>
