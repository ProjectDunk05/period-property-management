<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Period Property Management</title>
    <link rel="stylesheet" href="css/modern-normalise.css">
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="js/sign-in.js" defer></script>
</head>

<body>
    <picture class="background">
        <!-- AVIF source -->
        <source type="image/avif" srcset="
        images/background-stars-800.avif 800w,
        images/background-stars-1200.avif 1200w,
        images/background-stars-1600.avif 1600w" sizes="100vw">

        <!-- WebP source -->
        <source type="image/webp" srcset="
        images/background-stars-800.webp 800w,  
        images/background-stars-1200.webp 1200w,
        images/background-stars-1600.webp 1600w" sizes="100vw">

        <!-- JPEG fallback -->
        <img src="images/background-stars-1200.jpg" srcset="    
        images/background-stars-800.jpg 800w,
        images/background-stars-1200.jpg 1200w,
        images/background-stars-1600.jpg 1600w" sizes="100vw" alt="Background stars" class="background-img"  decoding="async"
            fetchpriority="high">
    </picture>
    <a href="index.html" class="portalButton return">Return To Site</a>
    <div class="container content">

        <div class="box">
            <div class="card">
                <h1>Welcome back!</h1>
                <p class="subtitle">Please enter your details to sign in.</p>

                <form>
                    <label for="email" class="portalLabel">Email <span class="required">*</span></label>
                    <input type="email" id="email" class="portalInput" placeholder="Enter your email" required>

                    <label for="password" class="portalLabel">Password <span class="required">*</span></label>
                    <input type="password" id="password" class="portalInput" placeholder="Enter your password" required>

                    <a href="forgotPassword.html" class="forgotPassword" target="_blank">Forgot your password ?</a>

                    <button type="submit" id="submit" class="login-btn">Log In</button>

                    <div class="divider">
                        <span>Or, Login with</span>
                    </div>

                    <button type="button" id="signInWithGoogle" class="google-btn">
                        <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" />
                        Sign up with google
                    </button>

                    <p class="register-text">Don't have an account ? <a href="register.html">Register here</a></p>
                </form>
            </div>
        </div>


</body>
</html>
