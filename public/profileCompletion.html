<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Period Property Management</title>
    <link rel="stylesheet" href="css/modern-normalise.css">
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="js/profileCompletion.js" defer></script>
</head>

<body>
    <picture class="background">
        <!-- AVIF source -->
        <source type="image/avif" srcset="
        images/background-stars-800.avif 800w,
        images/background-stars-1200.avif 1200w,
        images/background-stars-1600.avif 1600w" sizes="100vw">

        <!-- WebP source -->
        <source type="image/webp" srcset="
        images/background-stars-800.webp 800w,  
        images/background-stars-1200.webp 1200w,
        images/background-stars-1600.webp 1600w" sizes="100vw">

        <!-- JPEG fallback -->
        <img src="images/background-stars-1200.jpg" srcset="    
        images/background-stars-800.jpg 800w,
        images/background-stars-1200.jpg 1200w,
        images/background-stars-1600.jpg 1600w" sizes="100vw" alt="" class="background-img"  decoding="async"
            fetchpriority="high">
    </picture>
    <div class="container content">
        <div class="box">
            <div class="card">
                <h1>Account Successfully Created!</h1>
                <p class="subtitle">Please fill in the form below with the correct details. We need your FULL NAME and ADDRESS (address of the property managed by Period Property Management) so we can loacte the specific files that are relevent to you and your property</p>
                <form id="profile-form">
                        <label for="name" class="portalLabel">Full Name <span class="required">*</span></label>
                        <input type="string" id="name" class="portalInput" placeholder="e.g. John Smith" required>

                        <label for="postCode" class="portalLabel">Post Code <span class="required">*</span></label>
                        <input type="string" id="postCode" class="portalInput" placeholder="e.g. BN11AB" required>

                        <label for="address" class="portalLabel">Address Managed by PPM<span class="required">*</span></label>
                        <input type="string" id="address" class="portalInput" placeholder="e.g. Flat 1, 1 Ship Street" required>

                        <button type="submit" class="login-btn" id="submit">Confirm</button>
                </form>
            
            </div>
        </div>
    </div>

</body>
</html>
